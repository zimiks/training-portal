function getShuffledDailyLearningCard() {
  const data = ((state || {}).data || {}).dailyLearning || {};
  const items = Array.isArray(data.items) ? data.items.slice() : [];

  if (!items.length) return null;

  const current = data.todayCard || null;
  const candidates = items.filter(function(item) {
    if (!current) return true;

    return !(
      String(item.title || '') === String(current.title || '') &&
      String(item.content || '') === String(current.content || '') &&
      String(item.type || '') === String(current.type || '')
    );
  });

  const pool = candidates.length ? candidates : items;
  const index = Math.floor(Math.random() * pool.length);

  return pool[index];
}

function renderWeeklyStreakStrip(days) {
  if (!Array.isArray(days) || !days.length) return '';

  // Desired order: Sunday → Saturday
  const order = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];

  // Create a copy
  const daysCopy = days.slice();

  // Map by label (handle duplicate T/S carefully)
  const used = {};
  const orderedDays = [];

  order.forEach(function(label) {
    for (let i = 0; i < daysCopy.length; i++) {
      if (daysCopy[i].label === label && !used[i]) {
        orderedDays.push(daysCopy[i]);
        used[i] = true;
        break;
      }
    }
  });

  return `
    <div class="weekly-streak-strip" id="weeklyStreakStrip">
      ${orderedDays.map(function(day) {
        return `
          <div class="weekly-streak-day ${day.completed ? 'is-complete' : ''}" title="${day.dateKey}">
            <span class="weekly-streak-label">${day.label}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function handleRecommendedActionClick(action) {
  if (!action || !action.page) return;

  if (action.page === 'training') {
    switchPage('training');
    return;
  }

  if (action.page === 'updates') {
    switchPage('updates');
    return;
  }

  switchPage('dashboard');
}

function handleMarkLearned(cardId) {
  var btn = document.getElementById('markLearnedBtn');
  if (btn) {
    btn.disabled = true;
    btn.classList.add('is-loading');
    btn.textContent = 'Saving...';
  }

  google.script.run
    .withSuccessHandler(function(result) {
      if (state.data && state.data.dailyLearning) {
        state.data.dailyLearning.progress = state.data.dailyLearning.progress || { seenCardIds: [], learnedCardIds: [] };

        if (result && result.cardId) {
          if (state.data.dailyLearning.progress.learnedCardIds.indexOf(result.cardId) === -1) {
            state.data.dailyLearning.progress.learnedCardIds.push(result.cardId);
          }
          if (state.data.dailyLearning.progress.seenCardIds.indexOf(result.cardId) === -1) {
            state.data.dailyLearning.progress.seenCardIds.push(result.cardId);
          }
        }

        state.data.dailyLearning.meta = state.data.dailyLearning.meta || {};
        state.data.dailyLearning.meta.streak = Number(result.streak || 0);
        state.data.dailyLearning.meta.totalXp = Number(result.totalXp || 0);
        state.data.dailyLearning.meta.todayXp = Number(result.todayXp || 0);
        state.data.dailyLearning.meta.todayCompleted = !!result.todayCompleted;

        state.data.dailyLearning.streak = state.data.dailyLearning.streak || {};
        state.data.dailyLearning.streak.currentStreak = Number(result.streak || 0);
        state.data.dailyLearning.streak.bestStreak = Number(result.bestStreak || state.data.dailyLearning.streak.bestStreak || 0);
        state.data.dailyLearning.streak.totalXp = Number(result.totalXp || 0);

        state.data.dailyLearning.weeklyStatus = Array.isArray(result.weeklyDailyStatus)
          ? result.weeklyDailyStatus
          : state.data.dailyLearning.weeklyStatus;

        state.data.dailyLearning.leaderboard = Array.isArray(result.leaderboard)
          ? result.leaderboard
          : state.data.dailyLearning.leaderboard;
      }

      setDailyLearningCompletedState(result);
      showXpBurst(Number(result.xpEarned || 0));

      if (Number(result.streak || 0) > 0) {
        animateStreakPulse();
      }

      refreshDailyLearningLeaderboardDom(
        ((state || {}).data || {}).dailyLearning ? state.data.dailyLearning.leaderboard : []
      );

      var xpEarned = Number(result && result.xpEarned || 0);
      var streak = Number(result && result.streak || 0);
      var bestStreak = Number(result && result.bestStreak || 0);
      var feedback = 'Marked as learned successfully.';

      if (xpEarned > 0 && streak > 0) {
        feedback = 'Marked as learned. +' + xpEarned + ' XP earned. Streak: ' + streak + ' day' + (streak === 1 ? '' : 's') + '!';
      } else if (xpEarned > 0) {
        feedback = 'Marked as learned. +' + xpEarned + ' XP earned!';
      } else if (streak > 0) {
        feedback = 'Marked as learned. Streak: ' + streak + ' day' + (streak === 1 ? '' : 's') + '!';
      }

      if (bestStreak > 0 && bestStreak === streak) {
        feedback += ' Best streak: ' + bestStreak + '.';
      }

      showToast(feedback);
    })
    .withFailureHandler(function(error) {
      if (btn) {
        btn.disabled = false;
        btn.classList.remove('is-loading');
        btn.textContent = 'Mark as Learned';
      }
      showToast((error && error.message) ? error.message : 'Unable to save your progress.');
    })
    .markDailyLearningComplete(cardId);
}

function setDailyLearningCompletedState(result) {
  var btn = document.getElementById('markLearnedBtn');
  var streakValue = document.getElementById('dailyStreakValue');
  var totalXpValue = document.getElementById('dailyTotalXpValue');
  var statusText = document.getElementById('dailyStatusText');
  var statusPill = document.getElementById('dailyStatusPill');
  var weeklyStrip = document.getElementById('weeklyStreakStrip');

  var cardStreakPill = document.getElementById('dailyCardStreakPill');
  var cardTotalXpPill = document.getElementById('dailyCardTotalXpPill');
  var todayXpValue = document.getElementById('dailyTodayXpValue');
  var bannerStreakValue = document.getElementById('dailyBannerStreakValue');
  var banner = document.getElementById('dailyLearningCompletionBanner');
  var cardHost = document.getElementById('dailyLearningCardHost');

  if (btn) {
    btn.disabled = true;
    btn.classList.remove('is-loading');
    btn.classList.add('is-complete');
    btn.textContent = 'Completed Today';
  }

  if (streakValue) {
    streakValue.textContent = Number(result.streak || 0);
  }

  if (totalXpValue) {
    totalXpValue.textContent = Number(result.totalXp || 0);
  }

  if (statusText) {
    statusText.textContent = 'Completed today';
  }

  if (statusPill) {
    statusPill.classList.remove('is-pending');
    statusPill.classList.add('is-complete');
    var icon = statusPill.querySelector('.daily-meta-icon');
    if (icon) {
      icon.textContent = '✅';
    }
  }

  if (weeklyStrip && Array.isArray(result.weeklyDailyStatus)) {
    weeklyStrip.outerHTML = renderWeeklyStreakStrip(result.weeklyDailyStatus);
  }

  if (cardStreakPill) {
    cardStreakPill.textContent = '🔥 ' + Number(result.streak || 0) + ' day streak';
  }

  if (cardTotalXpPill) {
    cardTotalXpPill.textContent = '⭐ ' + Number(result.totalXp || 0) + ' XP';
  }

  if (todayXpValue) {
    todayXpValue.textContent = Number(result.todayXp || 0);
  }

  if (bannerStreakValue) {
    bannerStreakValue.textContent = Number(result.streak || 0);
  }

  if (!banner && cardHost) {
    var topStrip = cardHost.querySelector('.top-strip');
    if (topStrip) {
      topStrip.insertAdjacentHTML('afterend', renderDailyLearningCompletionBanner({
        todayCompleted: true,
        todayXp: Number(result.todayXp || 0),
        streak: Number(result.streak || 0)
      }));
    }
  }
}
function showXpBurst(xp) {
  if (!xp) return;

  var host = document.getElementById('dailyLearningCardHost') || document.body;
  if (host !== document.body) {
    host.style.position = host.style.position || 'relative';
  }

  var burst = document.createElement('div');
  burst.textContent = '+' + xp + ' XP';
  burst.style.position = host === document.body ? 'fixed' : 'absolute';
  burst.style.right = '18px';
  burst.style.top = '18px';
  burst.style.zIndex = '50';
  burst.style.padding = '12px 16px';
  burst.style.borderRadius = '999px';
  burst.style.background = '#fff4dd';
  burst.style.color = '#9a6a00';
  burst.style.fontWeight = '800';
  burst.style.boxShadow = '0 12px 24px rgba(154,106,0,0.18)';
  burst.style.pointerEvents = 'none';
  burst.style.opacity = '0';
  burst.style.transform = 'translateY(12px) scale(0.92)';

  host.appendChild(burst);

  burst.animate(
    [
      { opacity: 0, transform: 'translateY(12px) scale(0.92)' },
      { opacity: 1, transform: 'translateY(0) scale(1)' },
      { opacity: 1, transform: 'translateY(-10px) scale(1.02)' },
      { opacity: 0, transform: 'translateY(-22px) scale(0.98)' }
    ],
    {
      duration: 1100,
      easing: 'ease-out',
      fill: 'forwards'
    }
  );

  setTimeout(function() {
    if (burst && burst.parentNode) {
      burst.parentNode.removeChild(burst);
    }
  }, 1150);
}
function animateStreakPulse() {
  var streakBar = document.getElementById('dailyMetaBar');
  if (!streakBar || !streakBar.animate) return;

  streakBar.animate(
    [
      { transform: 'scale(1)', boxShadow: '0 0 0 rgba(15,79,134,0)' },
      { transform: 'scale(1.015)', boxShadow: '0 14px 30px rgba(15,79,134,0.12)' },
      { transform: 'scale(1)', boxShadow: '0 0 0 rgba(15,79,134,0)' }
    ],
    {
      duration: 650,
      easing: 'ease-out'
    }
  );
}
function bindDailyLearningActions() {
  const shuffleBtn = document.getElementById('shuffleDailyLearningBtn');
  const markLearnedBtn = document.getElementById('markLearnedBtn');
  const block = ((state || {}).data || {}).dailyLearning || {};
  const currentCard = block.todayCard || null;

  if (currentCard && currentCard.cardId) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.dailyLearning.progress = resp.progress || state.data.dailyLearning.progress;
        state.data.dailyLearning.streak = resp.streak || state.data.dailyLearning.streak;
      })
      .withFailureHandler(function(err) {
        console.error('Failed to mark daily learning seen', err);
      })
      .markDailyLearningSeen(currentCard.cardId);
  }

  if (shuffleBtn) {
    shuffleBtn.addEventListener('click', function() {
      const nextCard = getShuffledDailyLearningCard();
      if (!nextCard) return;

      state.data.dailyLearning.todayCard = nextCard;
      if (state.data.dailyLearning.meta) {
        state.data.dailyLearning.meta.todayCompleted = false;
      }
      renderApp();
      switchPage('dashboard');
    });
  }

  if (markLearnedBtn) {
    markLearnedBtn.addEventListener('click', function() {
      const cardId = this.getAttribute('data-card-id') || '';
      if (!cardId) return;
      handleMarkLearned(cardId);
    });
  }
}

  function getDriveFileIdFromUrl(url) {
    if (!url) return '';

    const value = String(url).trim();

    const match =
      value.match(/\/d\/([a-zA-Z0-9_-]{20,})/) ||
      value.match(/[?&]id=([a-zA-Z0-9_-]{20,})/) ||
      value.match(/^([a-zA-Z0-9_-]{20,})$/);

    return match ? (match[1] || match[0]) : '';
  }

  function isPdfLink(url) {
    if (!url) return false;

    const value = String(url).trim();

    return /\.pdf(\?|#|$)/i.test(value) || /drive\.google\.com/i.test(value);
  }

  function getPortalPdfViewerUrl(url) {
    if (!url) return '';

    const value = String(url).trim();

    if (/drive\.google\.com/i.test(value)) {
      const fileId = getDriveFileIdFromUrl(value);
      if (!fileId) return '';
      return 'https://drive.google.com/file/d/' + encodeURIComponent(fileId) + '/preview';
    }

    if (/\.pdf(\?|#|$)/i.test(value)) {
      return value;
    }

    return '';
  }

  function getEmbeddableResourceUrl(url) {
    return getPortalPdfViewerUrl(url);
  }

  function renderPdfViewerShell(containerId, pdfUrl) {

      return `

            min-height:220px;
            display:flex;

          box-sizing:border-box;

      >

          style="width:100%;height:100%;min-height:420px;border:none;background:#fff;"

        ></iframe>

  function loadPdfIntoContainer(pdfUrl, containerId) {
    const container = document.getElementById(containerId);
    if (!container || !pdfUrl) return;

    container.innerHTML = `
      <iframe
        src="${escapeHtml(pdfUrl)}"
        style="width:100%;height:100%;min-height:420px;border:none;background:#fff;"
        allow="autoplay"
      ></iframe>
    `;
  }

  function getSafeVideoEmbedUrl(url) {
    if (!url) return '';

    const value = String(url).trim();
    if (!value) return '';

    if (/youtube\.com\/embed\//i.test(value) || /youtube-nocookie\.com\/embed\//i.test(value)) {
      return value.indexOf('?') === -1
        ? value + '?rel=0&modestbranding=1&playsinline=1'
        : value + '&rel=0&modestbranding=1&playsinline=1';
    }

    let match = value.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    match = value.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    match = value.match(/\/shorts\/([a-zA-Z0-9_-]{6,})/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    match = value.match(/^([a-zA-Z0-9_-]{6,})$/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    return '';
  }

  function initApp() {
  const app = document.getElementById('app');

  if (app) {
    app.innerHTML = `
      <div class="loading-screen">
        <div class="loading-card">
          <h2>Loading portal...</h2>
          <p>Please wait while your training portal is prepared.</p>
        </div>
      </div>
    `;
  }

  google.script.run
    .withSuccessHandler(function(data) {
      state.data = data || {};

      const auth = state.data.auth || {};
      state.authRequired = !!auth.requireOtp;
      state.authMode = auth.mode || '';
      state.authMessage = auth.message || '';
      state.inactivityMinutes = Number(auth.reverifyMinutes || 60);

      renderApp();

      if (!state.authRequired) {
        startInactivityWatch();
        bindGlobalActivityWatch();
      }

      google.script.run
        .withSuccessHandler(function(deferred) {
          deferred = deferred || {};

          state.data.dailyLearning = deferred.dailyLearning || state.data.dailyLearning;
          state.data.updates = deferred.updates || state.data.updates;
          state.data.progressSummary = deferred.progressSummary || state.data.progressSummary;
          state.data.quizSummary = deferred.quizSummary || state.data.quizSummary;
          state.data.dashboardStats = deferred.dashboardStats || state.data.dashboardStats;
          state.data.modules = deferred.modules || state.data.modules;
          state.data.progressMap = deferred.progressMap || state.data.progressMap;
          state.data.resources = deferred.resources || state.data.resources;
          state.data.adminSnapshot = deferred.adminSnapshot || state.data.adminSnapshot;
          state.data.recommendedAction = deferred.recommendedAction || state.data.recommendedAction;

          renderApp();

          if (state.currentPage !== 'dashboard') {
            switchPage(state.currentPage);
          }
        })
        .withFailureHandler(function(err) {
          console.error('Deferred portal load failed', err);
        })
        .getDeferredPortalBootstrapData();
    })
    .withFailureHandler(function(err) {
      renderError('Failed to load portal data', err);
    })
    .getInitialPortalBootstrap();
}

  function renderError(title, err) {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="loading-screen">
        <div class="loading-card">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(getErrorMessage(err))}</p>
        </div>
      </div>
    `;
  }

  function getErrorMessage(err) {
    if (!err) return 'Unknown error';
    if (typeof err === 'string') return err;
    return err.message || JSON.stringify(err);
  }

  function renderApp() {
  const app = document.getElementById('app');
  const d = state.data;

  if (!d) {
    renderError('Portal data missing', 'No data available.');
    return;
  }

  if (d.restricted) {
    app.innerHTML = `
      <div class="restricted">
        <div class="restricted-card">
          <div class="pill">Restricted Access</div>
          <h2>${escapeHtml(d.restricted.title)}</h2>
          <p class="muted">${escapeHtml(d.restricted.message)}</p>
          <p class="muted">${escapeHtml(d.restricted.detail)}</p>
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>${escapeHtml(d.appName)}</h1>
          <p>Learning, assessments, updates, and admin controls</p>
        </div>

function openSpecificModuleFromChatbot(moduleId) {
  var targetModuleId = String(moduleId || '').trim();
  if (!targetModuleId) {
    return;
  }

  state.currentPage = 'training';
  renderApp();

  window.setTimeout(function() {
    scrollToTrainingModule_(targetModuleId);
  }, 60);
}
function scrollToTrainingModule_(moduleId) {
  var target = document.getElementById('training-module-' + moduleId);
  if (!target) {
    switchPage('training');

    window.setTimeout(function() {
      var retryTarget = document.getElementById('training-module-' + moduleId);
      if (retryTarget) {
        retryTarget.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    }, 120);

    return;
  }

  target.scrollIntoView({
    behavior: 'smooth',
    block: 'start'
  });
}

  function bindAuthActions() {
    const sendBtn = document.getElementById('sendOtpBtn');
    const verifyBtn = document.getElementById('verifyOtpBtn');
    const otpInput = document.getElementById('otpInput');

    if (otpInput) {
      otpInput.addEventListener('input', function() {
        state.otpValue = (this.value || '').replace(/\D/g, '').slice(0, 6);
        this.value = state.otpValue;
      });

      otpInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          verifyCurrentOtp();
        }
      });
    }

    if (sendBtn) {
      sendBtn.addEventListener('click', function() {
        sendCurrentOtp();
      });
    }

    if (verifyBtn) {
      verifyBtn.addEventListener('click', function() {
        verifyCurrentOtp();
      });
    }
  }

  function sendCurrentOtp() {
    if (state.authBusy) return;

    state.authBusy = true;
    renderApp();

    google.script.run
      .withSuccessHandler(function(resp) {
        state.authBusy = false;
        state.authMessage = (resp && resp.message) || 'OTP sent to your company email.';
        renderApp();
        showToast('OTP sent.');
      })
      .withFailureHandler(function(err) {
        state.authBusy = false;
        renderApp();
        showToast('Failed to send OTP: ' + getErrorMessage(err));
      })
      .sendLoginOtp();
  }

  function verifyCurrentOtp() {
    if (state.authBusy) return;

    const otp = (state.otpValue || '').trim();

    if (!otp || otp.length !== 6) {
      showToast('Please enter a valid 6-digit OTP.');
      return;
    }

    state.authBusy = true;
    renderApp();

    google.script.run
      .withSuccessHandler(function(resp) {
        state.authBusy = false;

        if (!resp || !resp.success) {
          state.authMessage = (resp && resp.message) || 'OTP verification failed.';
          renderApp();
          showToast(state.authMessage);
          return;
        }

        state.authRequired = false;
        state.authMode = '';
        state.authMessage = '';
        state.otpValue = '';

        renderApp();
        showToast('Verification successful.');

        startInactivityWatch();
        bindGlobalActivityWatch();
        notifyUserActivity();
      })
      .withFailureHandler(function(err) {
        state.authBusy = false;
        renderApp();
        showToast('Verification failed: ' + getErrorMessage(err));
      })
      .verifyLoginOtp(otp);
  }

  function startInactivityWatch() {
    clearInactivityWatch();

    state.inactivityTimerId = window.setTimeout(function() {
      triggerReverification();
    }, state.inactivityMinutes * 60 * 1000);
  }

  function clearInactivityWatch() {
    if (state.inactivityTimerId) {
      window.clearTimeout(state.inactivityTimerId);
      state.inactivityTimerId = null;
    }
  }

  function resetInactivityWatch() {
    if (state.authRequired) return;
    startInactivityWatch();
    notifyUserActivity();
  }

  function bindGlobalActivityWatch() {
    if (window.__authActivityBound) return;
    window.__authActivityBound = true;

    ['click', 'keydown', 'mousemove', 'scroll'].forEach(function(eventName) {
      window.addEventListener(eventName, debounceActivity(resetInactivityWatch, 15000), true);
    });
  }

  function debounceActivity(fn, delay) {
    let timer = null;
    return function() {
      window.clearTimeout(timer);
      timer = window.setTimeout(fn, delay);
    };
  }

  function triggerReverification() {
    state.authRequired = true;
    state.authMode = 'reauth';

    state.otpValue = '';

  }
function startChatbotPanelDrag(event) {
  var panel = document.getElementById('chatbotPanel');
  if (!panel) {
    return;
  }

  if (event.target && event.target.closest('button')) {
    return;
  }

  var rect = panel.getBoundingClientRect();

  state.chatbotDragActive = true;
  state.chatbotDragOffsetX = event.clientX - rect.left;
  state.chatbotDragOffsetY = event.clientY - rect.top;

  event.preventDefault();
}
function handleChatbotPanelDragMove(event) {
  if (!state.chatbotDragActive) {
    return;
  }

  var nextLeft = event.clientX - Number(state.chatbotDragOffsetX || 0);
  var nextTop = event.clientY - Number(state.chatbotDragOffsetY || 0);

  applyChatbotPanelPosition(nextLeft, nextTop);
}
function stopChatbotPanelDrag() {
  state.chatbotDragActive = false;
  state.chatbotDragOffsetX = 0;
  state.chatbotDragOffsetY = 0;
}
  function bindChatbotActions() {
  const form = document.getElementById('chatbotForm');
  const input = document.getElementById('chatbotInput');
  const header = document.getElementById('chatbotPanelHeader');
  const resetBtn = document.getElementById('chatbotResetPositionBtn');

  document.removeEventListener('mousemove', handleChatbotPanelDragMove);
  document.removeEventListener('mouseup', stopChatbotPanelDrag);

  document.addEventListener('mousemove', handleChatbotPanelDragMove);
  document.addEventListener('mouseup', stopChatbotPanelDrag);

  if (header) {
    header.removeEventListener('mousedown', startChatbotPanelDrag);
    header.addEventListener('mousedown', startChatbotPanelDrag);
  }

  if (resetBtn) {
    resetBtn.addEventListener('click', function(event) {
      event.preventDefault();
      event.stopPropagation();
      resetChatbotPanelPosition();
    });
  }

  if (!form || !input) {
    return;
  }

  input.addEventListener('input', function() {
    state.chatbotInputDraft = this.value || '';
  });

  form.addEventListener('submit', function(event) {
    event.preventDefault();
    handleChatbotSubmit();
  });

  input.addEventListener('keydown', function(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      handleChatbotSubmit();
    }
  });

  scrollChatbotToBottom();
  bindChatbotSuggestionActions();
}
function applyChatbotPanelPosition(left, top) {
  var panel = document.getElementById('chatbotPanel');
  if (!panel) {
    return;
  }

  var panelWidth = panel.offsetWidth || 380;
  var panelHeight = panel.offsetHeight || 560;
  var viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
  var viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
  var margin = 12;

  var minLeft = margin;
  var maxLeft = Math.max(margin, viewportWidth - panelWidth - margin);
  var minTop = margin;
  var maxTop = Math.max(margin, viewportHeight - panelHeight - margin);

  var safeLeft = Math.min(Math.max(left, minLeft), maxLeft);
  var safeTop = Math.min(Math.max(top, minTop), maxTop);

  state.chatbotPanelLeft = safeLeft;
  state.chatbotPanelTop = safeTop;

  panel.style.left = safeLeft + 'px';
  panel.style.top = safeTop + 'px';
  panel.style.right = 'auto';
  panel.style.bottom = 'auto';
}
function resetChatbotPanelPosition() {

    .split('\n')
    .map(function(part) {

    .filter(Boolean);

      current = part;
    }

  function refreshPortalStateAfterServerAction() {
    google.script.run
      .withSuccessHandler(function(data) {
        state.data = data;
        renderApp();
        if (state.currentPage !== 'dashboard') switchPage(state.currentPage);
      })
      .withFailureHandler(function(err) {
        showToast('Refresh failed: ' + getErrorMessage(err));
      })
      .refreshPortalData();
  }

function switchPage(page) {
  state.currentPage = page;

  if (page === 'training' && (!state.data.modules || !state.data.modules.length)) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.modules = resp.modules || [];
        state.data.progressMap = resp.progressMap || {};
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load training data: ' + getErrorMessage(err));
        renderApp();
      })
      .getTrainingPageData();
    renderApp();
    return;
  }

  if (page === 'company' && !state.data.company) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.company = resp.company || {};
        state.data.faq = resp.faq || [];
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load company data: ' + getErrorMessage(err));
        renderApp();
      })
      .getCompanyPageData();
    renderApp();
    return;
  }

  if (page === 'updates' && (!state.data.updates || !state.data.updates.length)) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.updates = resp.updates || [];
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load updates: ' + getErrorMessage(err));
        renderApp();
      })
      .getUpdatesPageData();
    renderApp();
    return;
  }

  if (page === 'admin' && state.data.access.isAdmin && !state.data.adminSnapshot) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.adminSnapshot = resp.adminSnapshot || {};
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load admin data: ' + getErrorMessage(err));
        renderApp();
      })
      .getAdminPageData();
    renderApp();
    return;
  }

  applyPageSwitchUi_();
}

function applyPageSwitchUi_() {
  document.querySelectorAll('.page').forEach(function(section) {
    section.classList.remove('active');
  });
  const activePage = document.getElementById('page-' + state.currentPage);
  if (activePage) {
    activePage.classList.add('active');
  }

  document.querySelectorAll('.menu-btn').forEach(function(btn) {
    const page = String(btn.getAttribute('data-page') || '').trim();
    if (page === state.currentPage) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

  function getTrackerBadge(status) {
    const map = {
      'Completed': { label: 'Completed', bg: '#e8f7ee', color: '#1d7f49' },
      'In Progress': { label: 'In Progress', bg: '#e8f1fb', color: '#0f4f86' },
      'Ready': { label: 'Ready', bg: '#fff4dd', color: '#9a6a00' },
      'Not Started': { label: 'Not Started', bg: '#eef2f6', color: '#5f7285' },
      'Locked': { label: 'Locked', bg: '#f3f4f6', color: '#7b8794' }
    };

    return map[status] || map['Not Started'];
  }

  function buildProgressKey(moduleId, lessonName) {
    return moduleId + '||' + lessonName;
  }

  function getValue(id) {
    const el = document.getElementById(id);
    return el ? (el.value || '').trim() : '';
  }

  function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const div = document.createElement('div');
    div.className = 'toast';
    div.textContent = message;
    document.body.appendChild(div);

    setTimeout(function() {
      div.remove();
    }, 2800);
  }

  function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  initApp();
