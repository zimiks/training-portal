<script>
  function getDriveImageUrlFromFileId(fileId, size) {
    if (!fileId) return '';
    return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(fileId) + '&sz=w' + (size || 1600);
  }

  const state = {
    data: null,
    currentPage: 'dashboard',
    selectedModuleQuiz: '',
    quizQuestions: [],
    quizAnswers: {},
    quizResult: null,
    adminReport: [],
    adminLoaded: false,
    chatbotOpen: false,
    chatbotMessages: [],
    chatbotLoading: false,
    chatbotInputDraft: '',
    chatbotInitialized: false,

    authRequired: false,
    authBusy: false,
    authMode: '',
    authMessage: '',
    otpValue: '',
    inactivityMinutes: 60,
    inactivityTimerId: null,
    lastActivityPingAt: 0
  };
function getShuffledDailyLearningCard() {
  const data = ((state || {}).data || {}).dailyLearning || {};
  const items = Array.isArray(data.items) ? data.items.slice() : [];

  if (!items.length) return null;

  const current = data.todayCard || null;
  const candidates = items.filter(function(item) {
    if (!current) return true;

    return !(
      String(item.title || '') === String(current.title || '') &&
      String(item.content || '') === String(current.content || '') &&
      String(item.type || '') === String(current.type || '')
    );
  });

  const pool = candidates.length ? candidates : items;
  const index = Math.floor(Math.random() * pool.length);

  return pool[index];
}

function renderDailyLearningCard() {
  const block = ((state || {}).data || {}).dailyLearning || {};
  const card = block.todayCard || null;
  const progress = block.progress || { seenCardIds: [], learnedCardIds: [] };
  const streak = block.streak || { currentStreak: 0, bestStreak: 0, totalXp: 0 };

  if (!card) {
    return `
      <section class="section" style="margin-top:14px;">
        <div class="card" style="border:1px solid #dbe8f3;background:#f8fbff;">
          <div class="pill">Daily Learning</div>
          <h3 style="margin-top:10px;">No daily learning card available</h3>
          <p class="muted">Add enabled rows in the DailyLearning sheet to show staffing and recruiter learning content here.</p>
        </div>
      </section>
    `;
  }

  const type = String(card.type || 'Tip');
  const tag = String(card.tag || 'Daily Learning');
  const title = String(card.title || '');
  const content = String(card.content || '');
  const subtext = String(card.subtext || '');
  const cardId = String(card.cardId || '');
  const xp = Number(card.xp || 5);

  const isQuiz = type.toLowerCase() === 'quiz';
  const isQuote = type.toLowerCase() === 'quote';
  const seen = Array.isArray(progress.seenCardIds) && progress.seenCardIds.indexOf(cardId) > -1;
  const learned = Array.isArray(progress.learnedCardIds) && progress.learnedCardIds.indexOf(cardId) > -1;

  return `
    <section class="section" style="margin-top:14px;">
      <div
        class="card"
        style="
          border:1px solid #dbe8f3;
          background:linear-gradient(135deg,#f8fbff 0%, #ffffff 100%);
          box-shadow:0 12px 28px rgba(15,79,134,0.08);
        "
      >
        <div class="top-strip" style="margin-bottom:10px;align-items:flex-start;">
          <div>
            <div class="pill">Daily Learning Card</div>
            <h3 style="margin:10px 0 0;">${escapeHtml(title || 'Daily Learning')}</h3>
            <p class="page-subtitle" style="margin-top:8px;">A quick staffing and recruiter learning booster for freshers and new joiners.</p>
          </div>

          <div class="toolbar" style="display:flex;gap:8px;flex-wrap:wrap;">
            <div class="pill" style="background:#fff4dd;color:#9a6a00;">XP ${xp}</div>
            <div class="pill" style="background:#e8f1fb;color:#0f4f86;">🔥 ${Number(streak.currentStreak) || 0} day streak</div>
            <div class="pill" style="background:#e8f7ee;color:#1d7f49;">⭐ ${Number(streak.totalXp) || 0} XP</div>
            <button type="button" class="btn btn-secondary" id="shuffleDailyLearningBtn">Shuffle</button>
          </div>
        </div>

        <div
          style="
            display:grid;
            grid-template-columns:minmax(0, 180px) minmax(0, 1fr);
            gap:16px;
            align-items:stretch;
          "
        >
          <div
            style="
              border-radius:18px;
              background:#0f4f86;
              color:#ffffff;
              padding:18px;
              display:flex;
              flex-direction:column;
              justify-content:space-between;
              min-height:180px;
            "
          >
            <div>
              <div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;opacity:0.88;">Type</div>
              <div style="font-size:24px;font-weight:700;margin-top:8px;">${escapeHtml(type)}</div>
            </div>

            <div style="margin-top:18px;">
              <div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;opacity:0.88;">Tag</div>
              <div style="font-size:14px;font-weight:600;margin-top:8px;">${escapeHtml(tag)}</div>
            </div>

            <div style="margin-top:18px;font-size:13px;opacity:0.92;">
              ${seen ? '👁 Seen' : '🆕 New'}
              <br>
              ${learned ? '✅ Learned' : '📘 Not learned yet'}
            </div>
          </div>

          <div
            style="
              border:1px solid #dbe8f3;
              border-radius:18px;
              padding:18px;
              background:#ffffff;
              display:flex;
              flex-direction:column;
              justify-content:space-between;
              min-height:180px;
            "
          >
            <div>
              <div style="font-size:18px;font-weight:700;color:#0f2740;line-height:1.5;">
                ${escapeHtml(content)}
              </div>

              ${
                !isQuote && subtext
                  ? `<div class="muted" style="margin-top:12px;line-height:1.7;">${escapeHtml(subtext)}</div>`
                  : ''
              }

              ${
                isQuiz
                  ? `
                    <div style="margin-top:16px;display:grid;gap:10px;">
                      ${[
                        { key: 'A', text: card.optionA || '' },
                        { key: 'B', text: card.optionB || '' },
                        { key: 'C', text: card.optionC || '' },
                        { key: 'D', text: card.optionD || '' }
                      ].filter(function(option) {
                        return String(option.text || '').trim();
                      }).map(function(option) {
                        return `
                          <div
                            style="
                              border:1px solid #d8e5f0;
                              border-radius:12px;
                              padding:12px 14px;
                              background:#f8fbff;
                              color:#244258;
                              font-size:14px;
                            "
                          >
                            <strong>${escapeHtml(option.key)}.</strong> ${escapeHtml(option.text)}
                          </div>
                        `;
                      }).join('')}
                    </div>

                    ${
                      card.correctOption
                        ? `<div class="muted" style="margin-top:14px;font-size:13px;">Correct option: <strong>${escapeHtml(card.correctOption)}</strong></div>`
                        : ''
                    }
                  `
                  : ''
              }
            </div>

            <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-top:18px;">
              ${
                isQuote && subtext
                  ? `
                    <div
                      style="
                        margin-top:18px;
                        text-align:right;
                        font-style:italic;
                        color:#5f7285;
                        font-size:14px;
                        margin-left:auto;
                      "
                    >
                      - ${escapeHtml(subtext)}
                    </div>
                  `
                  : `<div></div>`
              }

              <button
                type="button"
                class="btn ${learned ? 'btn-secondary' : 'btn-primary'}"
                id="markLearnedBtn"
                data-card-id="${escapeHtml(cardId)}"
                ${learned ? 'disabled' : ''}
              >
                ${learned ? 'Learned' : 'Mark as Learned'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  `;
}
function renderDailyLearningMeta(meta) {
  if (!meta) return '';

  return `
    <div class="daily-meta-bar" id="dailyMetaBar">
      <div class="daily-meta-pill">
        <span class="daily-meta-icon">🔥</span>
        <span class="daily-meta-text"><strong id="dailyStreakValue">${Number(meta.streak || 0)}</strong> day streak</span>
      </div>
      <div class="daily-meta-pill">
        <span class="daily-meta-icon">⭐</span>
        <span class="daily-meta-text"><strong id="dailyTotalXpValue">${Number(meta.totalXp || 0)}</strong> XP</span>
      </div>
      <div class="daily-meta-pill ${meta.todayCompleted ? 'is-complete' : 'is-pending'}" id="dailyStatusPill">
        <span class="daily-meta-icon">${meta.todayCompleted ? '✅' : '📘'}</span>
        <span class="daily-meta-text" id="dailyStatusText">${meta.todayCompleted ? 'Completed today' : 'Pending today'}</span>
      </div>
    </div>
  `;
}
function renderWeeklyStreakStrip(days) {
  if (!Array.isArray(days) || !days.length) return '';

  return `
    <div class="weekly-streak-strip" id="weeklyStreakStrip">
      ${days.map(function(day) {
        return `
          <div class="weekly-streak-day ${day.completed ? 'is-complete' : ''}" title="${day.dateKey}">
            <span class="weekly-streak-label">${day.label}</span>
          </div>
        `;
      }).join('')}
    </div>
  `;
}
function renderRecommendedAction(action) {
  return `
    <div class="recommended-action-content">
      <div class="recommended-action-card" id="recommendedActionCard">
        <div class="recommended-action-title">Before we begin today’s training, take a few minutes to revise what you learned previously or try to learn something new that can help you today</div>
      </div>
    </div>
  `;
}

function handleRecommendedActionClick(action) {
  if (!action || !action.page) return;

  if (action.page === 'training') {
    switchPage('training');
    return;
  }

  if (action.page === 'updates') {
    switchPage('updates');
    return;
  }

  switchPage('dashboard');
}

function handleMarkLearned(cardId) {
  var btn = document.getElementById('markLearnedBtn');
  if (btn) {
    btn.disabled = true;
    btn.classList.add('is-loading');
    btn.textContent = 'Saving...';
  }

  google.script.run
    .withSuccessHandler(function(result) {
      if (state.data && state.data.dailyLearning) {
        state.data.dailyLearning.progress = state.data.dailyLearning.progress || { seenCardIds: [], learnedCardIds: [] };

        if (result && result.cardId) {
          if (state.data.dailyLearning.progress.learnedCardIds.indexOf(result.cardId) === -1) {
            state.data.dailyLearning.progress.learnedCardIds.push(result.cardId);
          }
          if (state.data.dailyLearning.progress.seenCardIds.indexOf(result.cardId) === -1) {
            state.data.dailyLearning.progress.seenCardIds.push(result.cardId);
          }
        }

        state.data.dailyLearning.meta = state.data.dailyLearning.meta || {};
        state.data.dailyLearning.meta.streak = Number(result.streak || 0);
        state.data.dailyLearning.meta.totalXp = Number(result.totalXp || 0);
        state.data.dailyLearning.meta.todayXp = Number(result.todayXp || 0);
        state.data.dailyLearning.meta.todayCompleted = !!result.todayCompleted;
        state.data.dailyLearning.weeklyStatus = Array.isArray(result.weeklyDailyStatus)
          ? result.weeklyDailyStatus
          : state.data.dailyLearning.weeklyStatus;
      }

      setDailyLearningCompletedState(result);
      showXpBurst(Number(result.xpEarned || 0));

      if (Number(result.streak || 0) > 0) {
        animateStreakPulse();
      }

      showToast('Marked as learned. Great job!');
    })
    .withFailureHandler(function(error) {
      if (btn) {
        btn.disabled = false;
        btn.classList.remove('is-loading');
        btn.textContent = 'Mark as Learned';
      }
      showToast((error && error.message) ? error.message : 'Unable to save your progress.');
    })
    .markDailyLearningComplete(cardId);
}


function setDailyLearningCompletedState(result) {
  var btn = document.getElementById('markLearnedBtn');
  var streakValue = document.getElementById('dailyStreakValue');
  var totalXpValue = document.getElementById('dailyTotalXpValue');
  var statusText = document.getElementById('dailyStatusText');
  var statusPill = document.getElementById('dailyStatusPill');
  var weeklyStrip = document.getElementById('weeklyStreakStrip');

  if (btn) {
    btn.disabled = true;
    btn.classList.remove('is-loading');
    btn.classList.add('is-complete');
    btn.textContent = 'Completed Today';
  }

  if (streakValue) {
    streakValue.textContent = Number(result.streak || 0);
  }

  if (totalXpValue) {
    totalXpValue.textContent = Number(result.totalXp || 0);
  }

  if (statusText) {
    statusText.textContent = 'Completed today';
  }

  if (statusPill) {
    statusPill.classList.remove('is-pending');
    statusPill.classList.add('is-complete');
    var icon = statusPill.querySelector('.daily-meta-icon');
    if (icon) {
      icon.textContent = '✅';
    }
  }

  if (weeklyStrip && Array.isArray(result.weeklyDailyStatus)) {
    weeklyStrip.outerHTML = renderWeeklyStreakStrip(result.weeklyDailyStatus);
  }
}


function showXpBurst(xp) {
  if (!xp) return;

  var host = document.querySelector('.daily-learning-card') || document.body;
  var burst = document.createElement('div');
  burst.className = 'xp-burst';
  burst.textContent = '+' + xp + ' XP';

  host.appendChild(burst);

  setTimeout(function() {
    if (burst && burst.parentNode) {
      burst.parentNode.removeChild(burst);
    }
  }, 900);
}


function animateStreakPulse() {
  var streakBar = document.getElementById('dailyMetaBar');
  if (!streakBar) return;

  streakBar.classList.remove('streak-pulse');
  void streakBar.offsetWidth;
  streakBar.classList.add('streak-pulse');
}


function bindDailyLearningActions() {
  const shuffleBtn = document.getElementById('shuffleDailyLearningBtn');
  const markLearnedBtn = document.getElementById('markLearnedBtn');
  const block = ((state || {}).data || {}).dailyLearning || {};
  const currentCard = block.todayCard || null;

  if (currentCard && currentCard.cardId) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.dailyLearning.progress = resp.progress || state.data.dailyLearning.progress;
        state.data.dailyLearning.streak = resp.streak || state.data.dailyLearning.streak;
      })
      .withFailureHandler(function(err) {
        console.error('Failed to mark daily learning seen', err);
      })
      .markDailyLearningSeen(currentCard.cardId);
  }

  if (shuffleBtn) {
    shuffleBtn.addEventListener('click', function() {
      const nextCard = getShuffledDailyLearningCard();
      if (!nextCard) return;

      state.data.dailyLearning.todayCard = nextCard;
      if (state.data.dailyLearning.meta) {
        state.data.dailyLearning.meta.todayCompleted = false;
      }
      renderApp();
      switchPage('dashboard');
    });
  }

  if (markLearnedBtn) {
    markLearnedBtn.addEventListener('click', function() {
      const cardId = this.getAttribute('data-card-id') || '';
      if (!cardId) return;
      handleMarkLearned(cardId);
    });
  }
}

  function getDriveFileIdFromUrl(url) {
    if (!url) return '';

    const value = String(url).trim();

    const match =
      value.match(/\/d\/([a-zA-Z0-9_-]{20,})/) ||
      value.match(/[?&]id=([a-zA-Z0-9_-]{20,})/) ||
      value.match(/^([a-zA-Z0-9_-]{20,})$/);

    return match ? (match[1] || match[0]) : '';
  }

  function isPdfLink(url) {
    if (!url) return false;

    const value = String(url).trim();

    return /\.pdf(\?|#|$)/i.test(value) || /drive\.google\.com/i.test(value);
  }

  function getPortalPdfViewerUrl(url) {
    if (!url) return '';

    const value = String(url).trim();

    if (/drive\.google\.com/i.test(value)) {
      const fileId = getDriveFileIdFromUrl(value);
      if (!fileId) return '';
      return 'https://drive.google.com/file/d/' + encodeURIComponent(fileId) + '/preview';
    }

    if (/\.pdf(\?|#|$)/i.test(value)) {
      return value;
    }

    return '';
  }

  function getEmbeddableResourceUrl(url) {
    return getPortalPdfViewerUrl(url);
  }

  function renderPdfViewerShell(containerId, pdfUrl) {
    if (!pdfUrl) {
      return `
        <div
          id="${escapeHtml(containerId)}"
          style="
            width:100%;
            min-height:220px;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            color:#5f7285;
            font-size:14px;
            background:#ffffff;
            border:1px solid #d8e5f0;
            border-radius:14px;
            padding:20px;
            box-sizing:border-box;
          "
        >
          PDF URL not available.
        </div>
      `;
    }

    return `
      <div
        id="${escapeHtml(containerId)}"
        style="
          width:100%;
          height:100%;
          min-height:420px;
          overflow:hidden;
          background:#eef4f9;
          border-radius:14px;
          box-sizing:border-box;
          border:1px solid #d8e5f0;
        "
      >
        <iframe
          src="${escapeHtml(pdfUrl)}"
          style="width:100%;height:100%;min-height:420px;border:none;background:#fff;"
          allow="autoplay"
        ></iframe>
      </div>
    `;
  }

  function loadPdfIntoContainer(pdfUrl, containerId) {
    const container = document.getElementById(containerId);
    if (!container || !pdfUrl) return;

    container.innerHTML = `
      <iframe
        src="${escapeHtml(pdfUrl)}"
        style="width:100%;height:100%;min-height:420px;border:none;background:#fff;"
        allow="autoplay"
      ></iframe>
    `;
  }

  function getSafeVideoEmbedUrl(url) {
    if (!url) return '';

    const value = String(url).trim();
    if (!value) return '';

    if (/youtube\.com\/embed\//i.test(value) || /youtube-nocookie\.com\/embed\//i.test(value)) {
      return value.indexOf('?') === -1
        ? value + '?rel=0&modestbranding=1&playsinline=1'
        : value + '&rel=0&modestbranding=1&playsinline=1';
    }

    let match = value.match(/[?&]v=([a-zA-Z0-9_-]{6,})/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    match = value.match(/youtu\.be\/([a-zA-Z0-9_-]{6,})/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    match = value.match(/\/shorts\/([a-zA-Z0-9_-]{6,})/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    match = value.match(/^([a-zA-Z0-9_-]{6,})$/);
    if (match && match[1]) {
      return 'https://www.youtube.com/embed/' + match[1] + '?rel=0&modestbranding=1&playsinline=1';
    }

    return '';
  }

  function initApp() {
    google.script.run
      .withSuccessHandler(function(data) {
        state.data = data || {};

        const auth = state.data.auth || {};
        state.authRequired = !!auth.requireOtp;
        state.authMode = auth.mode || '';
        state.authMessage = auth.message || '';
        state.inactivityMinutes = Number(auth.reverifyMinutes || 60);

        renderApp();

        if (!state.authRequired) {
          startInactivityWatch();
          bindGlobalActivityWatch();
        }
      })
      .withFailureHandler(function(err) {
        renderError('Failed to load portal data', err);
      })
      .getPortalBootstrap();
  }

  function renderError(title, err) {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="loading-screen">
        <div class="loading-card">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(getErrorMessage(err))}</p>
        </div>
      </div>
    `;
  }

  function getErrorMessage(err) {
    if (!err) return 'Unknown error';
    if (typeof err === 'string') return err;
    return err.message || JSON.stringify(err);
  }

  function renderApp() {
  const app = document.getElementById('app');
  const d = state.data;

  if (!d) {
    renderError('Portal data missing', 'No data available.');
    return;
  }

  if (d.restricted) {
    app.innerHTML = `
      <div class="restricted">
        <div class="restricted-card">
          <div class="pill">Restricted Access</div>
          <h2>${escapeHtml(d.restricted.title)}</h2>
          <p class="muted">${escapeHtml(d.restricted.message)}</p>
          <p class="muted">${escapeHtml(d.restricted.detail)}</p>
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>${escapeHtml(d.appName)}</h1>
          <p>Learning, assessments, updates, and admin controls</p>
        </div>

        <div class="user-card">
          <div class="user-name">${escapeHtml(d.user.name)}</div>
          <div class="user-meta">${escapeHtml(d.user.email)}</div>
          <div class="user-meta">Domain: ${escapeHtml(d.user.domain || 'N/A')}</div>
          <div class="role-badge">${escapeHtml(d.access.role)}</div>
        </div>

        <div class="menu">
          <button class="menu-btn ${isActive('dashboard')}" data-page="dashboard">Dashboard</button>
          <button class="menu-btn ${isActive('company')}" data-page="company">Know Your Company</button>
          <button class="menu-btn ${isActive('training')}" data-page="training">Recruiter Learning Hub</button>
          <button class="menu-btn ${isActive('quiz')}" data-page="quiz">Assessments</button>
          <button class="menu-btn ${isActive('updates')}" data-page="updates">Updates & Changes</button>
          ${d.access.isAdmin ? `<button class="menu-btn ${isActive('admin')}" data-page="admin">Admin</button>` : ''}
        </div>

        <div class="sidebar-footer">
          <strong>Support:</strong><br>${escapeHtml(d.supportEmail)}<br><br>
          <strong>Website:</strong><br>
          <a href="${escapeHtml(d.companyWebsite)}" target="_blank">${escapeHtml(d.companyWebsite)}</a>
        </div>
      </aside>

      <main class="main">
        ${renderPages()}
      </main>
    </div>

    ${renderChatbotWidget()}
    ${renderAuthModal()}
  `;

  bindMenu();
  bindDailyLearningActions();
  bindTrainingActions();
  bindTrainingVisualActions();
  bindResourceModalActions();
  bindQuizActions();
  bindAdminActions();
  bindChatbotActions();
  bindAuthActions();
}
  function renderPages() {
    return `
      <section class="page ${isPage('dashboard')}" id="page-dashboard">${renderDashboardPage()}</section>
      <section class="page ${isPage('company')}" id="page-company">${renderCompanyPage()}</section>
      <section class="page ${isPage('training')}" id="page-training">${renderTrainingPage()}</section>
      <section class="page ${isPage('quiz')}" id="page-quiz">${renderQuizPage()}</section>
      <section class="page ${isPage('updates')}" id="page-updates">${renderUpdatesPage()}</section>
      ${state.data.access.isAdmin ? `<section class="page ${isPage('admin')}" id="page-admin">${renderAdminPage()}</section>` : ''}
    `;
  }

  function renderAuthModal() {
    if (!state.authRequired) return '';

    return `
      <div class="auth-overlay">
        <div class="auth-modal">
          <div class="pill">Secure Verification</div>
          <h3>${escapeHtml(state.authMode === 'reauth' ? 'Session expired' : 'Verify your login')}</h3>
          <p class="muted">
            ${escapeHtml(
              state.authMessage ||
              'Enter the OTP sent to your company email to continue.'
            )}
          </p>

          <input
            id="otpInput"
            class="field"

  function renderChatbotMessages() {
    if (!state.chatbotMessages.length) {
      return `
        <div style="text-align:center;padding:18px 12px;color:#6a8093;font-size:14px;">
          Start a conversation with the assistant.
        </div>
      `;
    }

    return state.chatbotMessages.map(function(message) {
      const isUser = message.role === 'user';

      return `
        <div style="display:flex;justify-content:${isUser ? 'flex-end' : 'flex-start'};margin-bottom:10px;">
          <div style="
            max-width:86%;
            padding:12px 14px;
            border-radius:${isUser ? '16px 16px 4px 16px' : '16px 16px 16px 4px'};

            color:${isUser ? '#ffffff' : '#244258'};
            border:${isUser ? 'none' : '1px solid #dbe8f3'};
            box-shadow:${isUser ? '0 8px 20px rgba(15,79,134,0.16)' : 'none'};
          ">
            <div style="font-size:14px;line-height:1.6;white-space:pre-wrap;">${formatChatMessageText(message.text)}</div>
            ${!isUser ? renderChatbotLinks(message.links) : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderChatbotLinks(links) {
    if (!Array.isArray(links) || !links.length) {
      return '';
    }

    const safeLinks = links.filter(function(link) {
      return link && link.url && link.title;
    });

    if (!safeLinks.length) {
      return '';
    }

    return `
      <div style="margin-top:10px;display:grid;gap:8px;">
        ${safeLinks.map(function(link) {
          return `
            <a
              href="${escapeHtml(link.url)}"
              target="_blank"
              rel="noopener noreferrer"
              style="
                display:block;
                padding:9px 10px;
                border-radius:12px;
                background:#ffffff;
                border:1px solid #d8e5f0;
                color:#0f4f86;
                font-size:13px;
                font-weight:700;
                text-decoration:none;
              "
            >
              ${escapeHtml(link.title)}
            </a>
          `;
        }).join('')}
      </div>
    `;
  }

  function formatChatMessageText(text) {
    return escapeHtml(text || '');
  }

  function ensureChatbotWelcomeMessage(chatbotMessage) {
    if (state.chatbotInitialized) {
      return;
    }

    state.chatbotMessages = [
      {
        role: 'assistant',
        text: chatbotMessage,
        links: []
      }
    ];

    state.chatbotInitialized = true;
  }

  function toggleChatbot() {
    state.chatbotOpen = !state.chatbotOpen;
    renderApp();

    if (state.chatbotOpen) {
      scrollChatbotToBottom();

      const input = document.getElementById('chatbotInput');
      if (input) {
        input.focus();
      }

    if (state.currentPage !== 'dashboard') {

  function bindAuthActions() {
    const sendBtn = document.getElementById('sendOtpBtn');
    const verifyBtn = document.getElementById('verifyOtpBtn');
    const otpInput = document.getElementById('otpInput');

    if (otpInput) {
      otpInput.addEventListener('input', function() {
        state.otpValue = (this.value || '').replace(/\D/g, '').slice(0, 6);
        this.value = state.otpValue;
      });

      otpInput.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          verifyCurrentOtp();
        }
      });
    }

    if (sendBtn) {
      sendBtn.addEventListener('click', function() {
        sendCurrentOtp();
      });
    }

    if (verifyBtn) {
      verifyBtn.addEventListener('click', function() {
        verifyCurrentOtp();
      });
    }
  }

  function sendCurrentOtp() {
    if (state.authBusy) return;

    state.authBusy = true;
    renderApp();

    google.script.run
      .withSuccessHandler(function(resp) {
        state.authBusy = false;
        state.authMessage = (resp && resp.message) || 'OTP sent to your company email.';
        renderApp();
        showToast('OTP sent.');
      })
      .withFailureHandler(function(err) {
        state.authBusy = false;
        renderApp();
        showToast('Failed to send OTP: ' + getErrorMessage(err));
      })
      .sendLoginOtp();
  }

  function verifyCurrentOtp() {
    if (state.authBusy) return;

    const otp = (state.otpValue || '').trim();

    if (!otp || otp.length !== 6) {
      showToast('Please enter a valid 6-digit OTP.');
      return;
    }

    state.authBusy = true;
    renderApp();

    google.script.run
      .withSuccessHandler(function(resp) {
        state.authBusy = false;

        if (!resp || !resp.success) {
          state.authMessage = (resp && resp.message) || 'OTP verification failed.';
          renderApp();
          showToast(state.authMessage);
          return;
        }

        state.authRequired = false;
        state.authMode = '';
        state.authMessage = '';
        state.otpValue = '';

        renderApp();
        showToast('Verification successful.');

        startInactivityWatch();
        bindGlobalActivityWatch();
        notifyUserActivity();
      })
      .withFailureHandler(function(err) {
        state.authBusy = false;
        renderApp();
        showToast('Verification failed: ' + getErrorMessage(err));
      })
      .verifyLoginOtp(otp);
  }

  function startInactivityWatch() {
    clearInactivityWatch();

    state.inactivityTimerId = window.setTimeout(function() {
      triggerReverification();
    }, state.inactivityMinutes * 60 * 1000);
  }

  function clearInactivityWatch() {
    if (state.inactivityTimerId) {
      window.clearTimeout(state.inactivityTimerId);
      state.inactivityTimerId = null;
    }
  }

  function resetInactivityWatch() {
    if (state.authRequired) return;
    startInactivityWatch();
    notifyUserActivity();
  }

  function bindGlobalActivityWatch() {
    if (window.__authActivityBound) return;
    window.__authActivityBound = true;

    ['click', 'keydown', 'mousemove', 'scroll'].forEach(function(eventName) {
      window.addEventListener(eventName, debounceActivity(resetInactivityWatch, 15000), true);
    });
  }

  function debounceActivity(fn, delay) {
    let timer = null;
    return function() {
      window.clearTimeout(timer);
      timer = window.setTimeout(fn, delay);
    };
  }

  function triggerReverification() {
    state.authRequired = true;
    state.authMode = 'reauth';
    state.authMessage = 'You were inactive for more than ' + state.inactivityMinutes + ' minutes. Please verify OTP to continue.';
    state.otpValue = '';
    clearInactivityWatch();
    renderApp();

    google.script.run
      .withFailureHandler(function(err) {
        console.error('Failed to log re-verification requirement', err);
      })
      .markSessionReverificationRequired();
  }

  function notifyUserActivity() {
    const now = Date.now();
    if ((now - Number(state.lastActivityPingAt || 0)) < 60000) {
      return;
    }
    state.lastActivityPingAt = now;

    google.script.run
      .withFailureHandler(function(err) {
        console.error('Activity update failed', err);
      })
      .updateUserActivity();
  }

  function bindChatbotActions() {
    const form = document.getElementById('chatbotForm');
    const input = document.getElementById('chatbotInput');

    if (!form || !input) {
      return;
    }

    input.addEventListener('input', function() {
      state.chatbotInputDraft = this.value || '';
    });

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      handleChatbotSubmit();
    });

    input.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        handleChatbotSubmit();
      }
    });

    scrollChatbotToBottom();

  function handleChatbotSubmit() {
    if (state.chatbotLoading) {
      return;
    }

    const input = document.getElementById('chatbotInput');
    const question = input ? (input.value || '').trim() : '';

    if (!question) {
      showToast('Please enter a question.');
      return;
    }

    state.chatbotMessages.push({
      role: 'user',
      text: question,
      links: []
    });

    state.chatbotInputDraft = '';
    state.chatbotLoading = true;

    renderApp();
    scrollChatbotToBottom();

    google.script.run
      .withSuccessHandler(function(response) {
        let assistantText = 'Sorry, I could not find a grounded answer for that question.';
        let assistantLinks = [];

        if (response && typeof response === 'object') {
          if (response.answer) {
            assistantText = String(response.answer);
          }
          if (Array.isArray(response.suggestions) && response.suggestions.length) {
            assistantText += '\n\nTry asking:\n- ' + response.suggestions.join('\n- ');
          }

          if (Array.isArray(response.links)) {
            assistantLinks = response.links
              .filter(function(link) {
                return link && link.title && link.url;
              })
              .map(function(link) {
                return {
                  title: String(link.title),
                  url: String(link.url)
                };
              });
          }
        } else if (typeof response === 'string' && response.trim()) {
          assistantText = response.trim();
        }

        state.chatbotMessages.push({
          role: 'assistant',
          text: assistantText,
          links: assistantLinks
        });

        state.chatbotLoading = false;
        renderApp();
        scrollChatbotToBottom();
      })
      .withFailureHandler(function(err) {
        state.chatbotMessages.push({
          role: 'assistant',
          text: 'Sorry, the assistant could not respond right now. ' + getErrorMessage(err),
          links: []
        });

        state.chatbotLoading = false;
        renderApp();
        scrollChatbotToBottom();
      })
      .askAssistant(question);
  }

  function scrollChatbotToBottom() {

      }

  }

  function bindQuizActions() {
    const submitBtn = document.getElementById('submitQuizBtn');
    const moduleSelect = document.getElementById('quizModuleSelect');

    if (moduleSelect) {
      moduleSelect.addEventListener('change', function() {
        const moduleId = this.value || '';
        loadQuizQuestionsForModule(moduleId);
      });
    }

    if (submitBtn) {
      submitBtn.addEventListener('click', function() {
        const moduleId = (document.getElementById('quizModuleSelect') || {}).value || '';

        if (!moduleId) {
          showToast('Please select a module first.');
          return;
        }

        if (!state.quizQuestions || !state.quizQuestions.length) {
          showToast('No assessment loaded.');
          return;
        }

        collectQuizAnswersFromDOM();

        const unanswered = state.quizQuestions.filter(function(q) {
          return !state.quizAnswers[q.questionId];
        });

        if (unanswered.length) {
          showToast('Please answer all questions before submitting.');
          return;
        }

        google.script.run
          .withSuccessHandler(function(result) {
            state.quizResult = result;

            if (result && result.quizSummary) {
              state.data.quizSummary = result.quizSummary;
            }

            renderApp();
            switchPage('quiz');
            showToast('Assessment submitted.');
          })
          .withFailureHandler(function(err) {
            showToast('Failed to submit assessment: ' + getErrorMessage(err));
          })
          .submitQuiz({
            moduleId: moduleId,
            questionIds: state.quizQuestions.map(function(q) {
              return q.questionId;
            }),
            answers: state.quizAnswers
          });
      });
    }

    bindQuizOptionListeners();

    if (state.currentPage === 'quiz' && state.selectedModuleQuiz && !state.quizQuestions.length) {
      loadQuizQuestionsForModule(state.selectedModuleQuiz);
    }
  }

  function loadQuizQuestionsForModule(moduleId) {
    state.selectedModuleQuiz = moduleId;
    state.quizQuestions = [];
    state.quizAnswers = {};
    state.quizResult = null;

    const moduleSelect = document.getElementById('quizModuleSelect');
    if (moduleSelect && moduleSelect.value !== moduleId) {
      moduleSelect.value = moduleId;
    }

    const quizContainer = document.getElementById('quizContainer');
    if (quizContainer) {
      quizContainer.innerHTML = moduleId
        ? '<div class="empty-state">Loading assessment questions...</div>'
        : '<div class="empty-state">Select a module to see questions here.</div>';
    }

    if (!moduleId) {
      return;
    }

    google.script.run
      .withSuccessHandler(function(questions) {
        state.quizQuestions = Array.isArray(questions) ? questions : [];
        state.quizAnswers = {};
        state.quizResult = null;

        const updatedQuizContainer = document.getElementById('quizContainer');
        if (updatedQuizContainer) {
          updatedQuizContainer.innerHTML = renderQuizQuestions();
        }

        bindQuizOptionListeners();

        if (!state.quizQuestions.length) {
          showToast('No assessment questions found for this module.');
          return;

        showToast('Assessment loaded automatically.');

      .withFailureHandler(function(err) {

        const updatedQuizContainer = document.getElementById('quizContainer');
        if (updatedQuizContainer) {
          updatedQuizContainer.innerHTML = '<div class="empty-state">Failed to load assessment questions.</div>';
        }

        showToast('Failed to load assessment: ' + getErrorMessage(err));

function switchPage(page) {
  state.currentPage = page;

  if (page === 'training' && (!state.data.modules || !state.data.modules.length)) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.modules = resp.modules || [];
        state.data.progressMap = resp.progressMap || {};
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load training data: ' + getErrorMessage(err));
        renderApp();
      })
      .getTrainingPageData();
    renderApp();
    return;
  }

  if (page === 'company' && !state.data.company) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.company = resp.company || {};
        state.data.faq = resp.faq || [];
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load company data: ' + getErrorMessage(err));
        renderApp();
      })
      .getCompanyPageData();
    renderApp();
    return;
  }

  if (page === 'updates' && (!state.data.updates || !state.data.updates.length)) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.updates = resp.updates || [];
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load updates: ' + getErrorMessage(err));
        renderApp();
      })
      .getUpdatesPageData();
    renderApp();
    return;
  }

  if (page === 'admin' && state.data.access.isAdmin && !state.data.adminSnapshot) {
    google.script.run
      .withSuccessHandler(function(resp) {
        state.data.adminSnapshot = resp.adminSnapshot || {};
        renderApp();
      })
      .withFailureHandler(function(err) {
        showToast('Failed to load admin data: ' + getErrorMessage(err));
        renderApp();
      })
      .getAdminPageData();
    renderApp();
    return;
  }

  applyPageSwitchUi_();
}

function applyPageSwitchUi_() {
  document.querySelectorAll('.page').forEach(function(section) {
    section.classList.remove('active');
  });
  const activePage = document.getElementById('page-' + state.currentPage);
  if (activePage) {
    activePage.classList.add('active');
  }

  document.querySelectorAll('.menu-btn').forEach(function(btn) {
    const page = String(btn.getAttribute('data-page') || '').trim();
    if (page === state.currentPage) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

  function openModuleQuiz(moduleId) {
  state.selectedModuleQuiz = moduleId || '';
  state.quizQuestions = [];
  state.quizAnswers = {};
  state.quizResult = null;
  state.currentPage = 'quiz';
  renderApp();

  if (moduleId) {
    loadQuizQuestionsForModule(moduleId);
  }
}

  function isActive(page) {
    return state.currentPage === page ? 'active' : '';
  }

  function isPage(page) {
    return state.currentPage === page ? 'active' : '';
  }

  function statusClass(status) {
    const val = String(status || '').toLowerCase();
    if (val === 'completed') return 'status-completed';
    if (val === 'in progress') return 'status-in-progress';
    return 'status-not-started';
  }

  function getTrackerBadge(status) {
    const map = {
      'Completed': { label: 'Completed', bg: '#e8f7ee', color: '#1d7f49' },
      'In Progress': { label: 'In Progress', bg: '#e8f1fb', color: '#0f4f86' },
      'Ready': { label: 'Ready', bg: '#fff4dd', color: '#9a6a00' },
      'Not Started': { label: 'Not Started', bg: '#eef2f6', color: '#5f7285' },
      'Locked': { label: 'Locked', bg: '#f3f4f6', color: '#7b8794' }
    };

    return map[status] || map['Not Started'];
  }

  function buildProgressKey(moduleId, lessonName) {
    return moduleId + '||' + lessonName;
  }

  function getValue(id) {
    const el = document.getElementById(id);
    return el ? (el.value || '').trim() : '';
  }

  function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const div = document.createElement('div');
    div.className = 'toast';
    div.textContent = message;
    document.body.appendChild(div);

    setTimeout(function() {
      div.remove();
    }, 2800);
  }

  function escapeHtml(value) {
    if (value === null || value === undefined) return '';
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  initApp();
</script>
